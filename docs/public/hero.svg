  </g>
  <g transform="translate(500, 100)">
    <circle cx="0" cy="0" r="20" fill="#1e6bff" opacity="0.2"/>
    <text x="0" y="6" text-anchor="middle" font-size="20">💡</text>
  </g>
  <g transform="translate(150, 320)">
    <circle cx="0" cy="0" r="20" fill="#1e6bff" opacity="0.2"/>
    <text x="0" y="6" text-anchor="middle" font-size="20">📊</text>
  </g>
  <g transform="translate(450, 300)">
    <circle cx="0" cy="0" r="20" fill="#1e6bff" opacity="0.2"/>
    <text x="0" y="6" text-anchor="middle" font-size="20">🎓</text>
  </g>
</svg>
